<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: head('Register - Job Portal')}"></head>
<body>
    <nav th:replace="~{fragments/layout :: navbar}"></nav>
    
    <div class="main-container" style="display: flex; justify-content: center; align-items: center; min-height: 80vh;">
        <div class="glass-card" style="max-width: 500px; width: 100%;">
            <h2 style="text-align: center; margin-bottom: 2rem; color: var(--primary);">Create an Account</h2>
            
            <div th:if="${error}" style="background: #fee2e2; color: #b91c1c; padding: 1rem; border-radius: 8px; margin-bottom: 1rem;" th:text="${error}"></div>

            <form th:action="@{/register}" th:object="${user}" method="post">
                <div class="form-group">
                    <label>I am a:</label>
                    <select name="roleType" class="form-control" onchange="toggleFields(this.value)">
                        <option value="STUDENT" th:selected="${param.roleType != null && param.roleType[0] == 'STUDENT'}">Job Seeker (Student)</option>
                        <option value="EMPLOYER" th:selected="${param.roleType != null && param.roleType[0] == 'EMPLOYER'}">Employer</option>
                    </select>
                </div>
                
                <div class="form-group">
                    <label for="fullName">Full Name</label>
                    <input type="text" id="fullName" th:field="*{fullName}" class="form-control" required>
                </div>
                
                <div class="form-group">
                    <label for="email">Email Address</label>
                    <input type="email" id="email" th:field="*{email}" class="form-control" required>
                </div>
                
                <div class="form-group">
                    <label for="password">Password</label>
                    <input type="password" id="password" th:field="*{password}" class="form-control" required minlength="6">
                </div>

                <div class="form-group" id="companyField" style="display: none;">
                    <label for="companyName">Company Name</label>
                    <input type="text" id="companyName" th:field="*{companyName}" class="form-control">
                </div>
                
                <button type="submit" class="btn-primary" style="width: 100%; margin-top: 1rem;">Register</button>
            </form>
            
            <p style="text-align: center; margin-top: 1.5rem; color: var(--gray);">
                Already have an account? <a href="/login" style="color: var(--primary);">Sign in</a>
            </p>
        </div>
    </div>
    
    <footer th:replace="~{fragments/layout :: footer}"></footer>
    
    <script>
        function toggleFields(role) {
            const companyField = document.getElementById('companyField');
            if(role === 'EMPLOYER') {
                companyField.style.display = 'block';
            } else {
                companyField.style.display = 'none';
            }
        }
        
        // Run on load
        document.addEventListener("DOMContentLoaded", function() {
            const select = document.querySelector('select[name="roleType"]');
            toggleFields(select.value);
        });
    </script>
</body>
</html>
