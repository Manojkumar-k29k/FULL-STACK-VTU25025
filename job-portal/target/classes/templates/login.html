<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: head('Login - Job Portal')}"></head>
<body>
    <nav th:replace="~{fragments/layout :: navbar}"></nav>
    
    <div class="main-container" style="display: flex; justify-content: center; align-items: center; min-height: 80vh;">
        <div class="glass-card" style="max-width: 400px; width: 100%;">
            <h2 style="text-align: center; margin-bottom: 2rem; color: var(--primary);">Welcome Back</h2>
            
            <div th:if="${param.error}" style="background: #fee2e2; color: #b91c1c; padding: 1rem; border-radius: 8px; margin-bottom: 1rem;">
                Invalid email or password.
            </div>
            <div th:if="${param.logout}" style="background: #d1fae5; color: #065f46; padding: 1rem; border-radius: 8px; margin-bottom: 1rem;">
                You have been logged out.
            </div>
            <div th:if="${param.success}" style="background: #d1fae5; color: #065f46; padding: 1rem; border-radius: 8px; margin-bottom: 1rem;">
                Registration successful! Please login.
            </div>

            <form th:action="@{/login}" method="post">
                <div class="form-group">
                    <label for="username">Email Address</label>
                    <input type="email" id="username" name="username" class="form-control" required autofocus>
                </div>
                
                <div class="form-group">
                    <label for="password">Password</label>
                    <input type="password" id="password" name="password" class="form-control" required>
                </div>
                
                <button type="submit" class="btn-primary" style="width: 100%; margin-top: 1rem;">Sign In</button>
            </form>
            
            <p style="text-align: center; margin-top: 1.5rem; color: var(--gray);">
                Don't have an account? <a href="/register" style="color: var(--primary);">Sign up</a>
            </p>
        </div>
    </div>
    
    <footer th:replace="~{fragments/layout :: footer}"></footer>
</body>
</html>
