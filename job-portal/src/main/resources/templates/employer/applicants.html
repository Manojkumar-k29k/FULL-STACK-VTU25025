<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: head('Applicants for Job')}"></head>
<body>
    <nav th:replace="~{fragments/layout :: navbar}"></nav>
    
    <div class="main-container">
        <h2 style="margin-bottom: 2rem;">Applicants for <span th:text="${job.title}"></span></h2>
        
        <div class="glass-card">
            <div th:if="${#lists.isEmpty(applications)}">
                <p>No one has applied to this position yet.</p>
            </div>
            
            <table th:unless="${#lists.isEmpty(applications)}">
                <thead>
                    <tr>
                        <th>Candidate Name</th>
                        <th>Email</th>
                        <th>Applied Date</th>
                        <th>Cover Letter</th>
                        <th>Current Status</th>
                        <th>Action</th>
                    </tr>
                </thead>
                <tbody>
                    <tr th:each="app : ${applications}">
                        <td th:text="${app.user.fullName}"></td>
                        <td th:text="${app.user.email}"></td>
                        <td th:text="${app.appliedDate}"></td>
                        <td>
                            <button class="btn-secondary" style="font-size: 0.8rem; padding: 0.3rem 0.6rem;" 
                                    th:onclick="'alert(\'' + ${app.coverLetter} + '\')'">Read</button>
                        </td>
                        <td>
                            <span class="badge" th:classappend="${app.status == 'Shortlisted'} ? 'badge-success' : ''" th:text="${app.status}"></span>
                        </td>
                        <td>
                            <form th:action="@{'/employer/applications/' + ${app.id} + '/status'}" method="post" style="display: flex; gap: 0.5rem;">
                                <select name="status" class="form-control" style="padding: 0.3rem; width: auto;">
                                    <option value="Under Review" th:selected="${app.status == 'Under Review'}">Under Review</option>
                                    <option value="Shortlisted" th:selected="${app.status == 'Shortlisted'}">Shortlisted</option>
                                    <option value="Rejected" th:selected="${app.status == 'Rejected'}">Rejected</option>
                                </select>
                                <button type="submit" class="btn-primary" style="padding: 0.3rem 0.6rem;">Save</button>
                            </form>
                        </td>
                    </tr>
                </tbody>
            </table>
            
            <div style="margin-top: 2rem;">
                <a th:href="@{/employer/dashboard}" class="btn-secondary">Back to Dashboard</a>
            </div>
        </div>
    </div>
    
    <footer th:replace="~{fragments/layout :: footer}"></footer>
</body>
</html>
