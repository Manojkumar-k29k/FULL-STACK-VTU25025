<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: head('Browse Jobs')}"></head>
<body>
    <nav th:replace="~{fragments/layout :: navbar}"></nav>
    
    <div class="main-container">
        
        <!-- Search Hero Section -->
        <div class="hero" style="padding: 3rem 2rem; border-radius: 16px; margin-bottom: 2rem;">
            <h2>Find Your Next Opportunity</h2>
            <form th:action="@{/jobs}" method="get" style="display: flex; gap: 1rem; max-width: 600px; margin: 1.5rem auto 0 auto;">
                <input type="text" name="keyword" th:value="${param.keyword}" class="form-control" placeholder="Job title, keywords, or location" style="flex: 1; padding: 1rem; font-size: 1.1rem; border: none; box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);">
                <button type="submit" class="btn-primary" style="padding: 1rem 2rem; font-size: 1.1rem;">Search</button>
            </form>
        </div>

        <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 2rem;">
            <h3>Latest Job Postings</h3>
            <span th:text="${#lists.size(jobs)} + ' jobs found'" style="color: var(--gray); font-weight: 500;"></span>
        </div>

        <div class="job-grid">
            <div th:if="${#lists.isEmpty(jobs)}" style="grid-column: span 3; text-align: center; padding: 3rem; background: rgba(255,255,255,0.5); border-radius: 12px;">
                <h4>No jobs match your criteria.</h4>
                <p>Try adjusting your search keywords.</p>
            </div>

            <div class="glass-card" th:each="job : ${jobs}">
                <div style="display: flex; justify-content: space-between; align-items: start; margin-bottom: 1rem;">
                    <h3 th:text="${job.title}" style="margin: 0; color: var(--primary);"></h3>
                    <span class="badge badge-success" th:if="${job.status == 'Active'}">Active</span>
                </div>
                
                <p style="color: var(--gray); font-weight: 500; margin-bottom: 0.5rem; display: flex; align-items: center; gap: 0.5rem;">
                    🏢 <span th:text="${job.employer.companyName}"></span>
                </p>
                <p style="color: var(--gray); margin-bottom: 1.5rem; display: flex; align-items: center; gap: 0.5rem;">
                    📍 <span th:text="${job.location}"></span>
                </p>
                
                <div style="display: flex; gap: 0.5rem; flex-wrap: wrap; margin-bottom: 1.5rem;">
                    <span class="badge" th:text="${job.category}"></span>
                    <span class="badge" th:text="${job.experienceRequired}"></span>
                </div>
                
                <a th:href="@{'/jobs/' + ${job.id}}" class="btn-primary" style="width: 100%; text-align: center;">View Details</a>
            </div>
        </div>
    </div>
    
    <footer th:replace="~{fragments/layout :: footer}"></footer>
</body>
</html>
