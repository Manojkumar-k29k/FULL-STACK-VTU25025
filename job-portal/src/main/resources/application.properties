spring.application.name=job-portal
spring.datasource.url=jdbc:mysql://localhost:3306/jobportaldb?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.datasource.username=root
spring.datasource.password=ShivaMadhu29@

# Dialect is auto-detected by Hibernate 6+, no need to specify explicitly
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.open-in-view=false

# File upload configuration
spring.servlet.multipart.max-file-size=5MB
spring.servlet.multipart.max-request-size=5MB

# Thymeleaf properties
spring.thymeleaf.cache=false

# Suppress Spring Security warning about custom AuthenticationProvider (this is intentional)
logging.level.org.springframework.security.config.annotation.authentication.configuration.InitializeUserDetailsBeanManagerConfigurer=ERROR
